services:
  - type: web
    name: practica-diabetes-ml-api
    env: python
    rootDir: lambda-api
    buildCommand: python -m pip install -r requirements.txt --timeout 100 --retries 10
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: ALLOWED_ORIGINS
        value: https://tu-frontend.vercel.app
